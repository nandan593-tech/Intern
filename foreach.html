<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForEach</title>
</head>
<body>
    <h1 id="result"></h1>

    <script>
        let fruits = ["apple", "banana", "orange", "pumpkin"];
         fruits.forEach(capital);
         fruits.forEach(displayCHTML);
        function displayCHTML(fruit) {
            document.getElementById("result").innerHTML += fruit + "<br>";
        }

        
        function capital(element,index,array){
            array[index]=element.toUpperCase();



        }
    </script>
</body>
</html>
