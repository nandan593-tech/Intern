<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAP()</title>
</head>
<body>
    <script>
        let dates=["2-4-2026","3-4-2026","6-4-2026"];
        let formatt=dates.map(formatted);
        console.log(formatt);

         function formatted(element){
            let parts=element.split("-");
            return `${parts[2]}/${parts[1]}/${parts[0]}`;

        }
    </script>
</body>
</html>
