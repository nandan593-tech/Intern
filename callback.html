 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Back</title>
 </head>
 <body>
    <script>
        sum(displayConsole,3,4);
        function sum(callback,x,y){
            let result=x+y;
            callback(result);

        }
        function displayConsole(result){
            console.log(result);
        }
    </script>
 </body>
 </html>
